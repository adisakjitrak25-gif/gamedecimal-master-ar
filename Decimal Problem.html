<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decimal Mastery: Motion & Manual Next</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        #video-feed { position: absolute; width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); opacity: 0.2; }
        .option-btn { cursor: pointer; transition: all 0.2s; z-index: 10; border: 4px solid #e2e8f0; }
        .feedback-correct { background-color: #22c55e !important; color: white !important; border-color: #fff !important; }
        .feedback-wrong { background-color: #ef4444 !important; color: white !important; border-color: #fff !important; }
    </style>
</head>
<body>
    <video id="video-feed" autoplay playsinline muted></video>
    <canvas id="canvas" class="hidden"></canvas>

    <div class="relative z-10 flex flex-col items-center justify-center h-screen p-6">
        <!-- ป้ายแสดงข้อ -->
        <div class="bg-indigo-600 text-white px-6 py-2 rounded-full font-bold text-lg mb-4 shadow-xl border-2 border-indigo-300">
            ข้อปัจจุบัน: <span id="progress">1</span> / 100
        </div>
        
        <div id="question" class="bg-white/95 p-8 rounded-2xl text-2xl font-bold text-slate-800 text-center mb-8 shadow-2xl max-w-2xl border-4 border-indigo-200">
            กำลังเตรียมโจทย์...
        </div>
        
        <div id="options-grid" class="grid grid-cols-2 gap-4 w-full max-w-2xl mb-8"></div>
        
        <!-- ป้ายและปุ่มคลิกข้อถัดไป -->
        <button onclick="next()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-10 py-4 rounded-full text-xl font-bold shadow-2xl transition-all z-20 flex items-center gap-2">
            <span>คลิกไปข้อถัดไป</span>
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
        </button>
    </div>

    <script>
        let qCount = 0, currentAns = 0, isLocked = false;
        const video = document.getElementById('video-feed'), canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
        let prevData = null;

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                requestAnimationFrame(loop);
                next();
            } catch(e) { next(); }
        }

        function next() {
            qCount++;
            if (qCount > 100) { location.reload(); return; }
            isLocked = false;
            prevData = null;

            const A = (Math.random() * 200 + 50).toFixed(2), B = (Math.random() * 20 + 5).toFixed(2), C = (Math.random() * 20 + 5).toFixed(2);
            currentAns = parseFloat((A - B - C).toFixed(2));
            
            document.getElementById('progress').innerText = qCount;
            document.getElementById('question').innerText = `ถังน้ำจุ ${A} ลิตร ใช้วันแรก ${B} ลิตร วันที่สอง ${C} ลิตร เหลือเท่าใด?`;
            
            const grid = document.getElementById('options-grid');
            grid.innerHTML = "";
            let choices = [currentAns];
            while(choices.length < 4) choices.push(parseFloat((currentAns + (Math.random()-0.5)*20).toFixed(2)));
            choices.sort(() => Math.random() - 0.5);
            
            choices.forEach(val => {
                const btn = document.createElement('div');
                btn.className = "option-btn bg-white p-6 rounded-xl shadow-lg text-center font-bold text-xl text-slate-800";
                btn.innerText = `${val.toFixed(2)} ลิตร`;
                btn.onclick = () => handleChoice(btn, val);
                grid.appendChild(btn);
            });
        }

        function handleChoice(el, val) {
            if (isLocked) return;
            isLocked = true;
            el.classList.add(Math.abs(val - currentAns) < 0.01 ? 'feedback-correct' : 'feedback-wrong');
            setTimeout(next, 800);
        }

        function loop() {
            if (!isLocked && video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = 160; canvas.height = 120;
                ctx.drawImage(video, 0, 0, 160, 120);
                const curData = ctx.getImageData(0,0,160,120).data;
                if (prevData) {
                    document.querySelectorAll('.option-btn').forEach(el => {
                        const r = el.getBoundingClientRect();
                        const x = Math.floor((r.left + r.width/2)/window.innerWidth * 160);
                        const y = Math.floor((r.top + r.height/2)/window.innerHeight * 120);
                        if (Math.abs(curData[(y*160+x)*4] - prevData[(y*160+x)*4]) > 60) handleChoice(el, parseFloat(el.innerText));
                    });
                }
                prevData = curData;
            }
            requestAnimationFrame(loop);
        }

        init();
    </script>
</body>
</html>
